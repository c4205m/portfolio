<section class="contact no-print">
  <h2>Contact</h2>

  <div class="contact-card">
    <p class="contact-intro">
      Have a project, collaboration, or idea in mind? Let’s build something meaningful.
    </p>

    <form class="contact-form" action="https://formspree.io/f/xgolgevd" method="POST" novalidate>
      <!-- Honeypot -->
      <input type="text" name="_gotcha" class="hidden-field" tabindex="-1" autocomplete="off">

      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" name="name" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" required></textarea>
      </div>

      <button type="submit">
        <span class="btn-text">Send Message</span>
      </button>

      <p class="form-status" aria-live="polite"></p>
    </form>
  </div>
</section>
