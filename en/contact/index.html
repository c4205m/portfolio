<link rel="stylesheet" href="/portfolio/contact.css">



<section class="contact no-print">
  <h2>Contact</h2>

  <div class="contact-card">
    <p class="contact-intro">
      Have a project, collaboration, or idea in mind? Let’s build something cool.
    </p>

    <form class="contact-form" action="https://formspree.io/f/xgolgevd" method="POST" novalidate data-err-name="Please enter your name." data-err-email-empty="Please enter your email." data-err-email-invalid="Please enter a valid email." data-err-message="Please enter a message." data-sent="Sent" data-status-success="Message delivered successfully." data-status-error="Something went wrong. Please try again.">
      <!-- Honeypot -->
      <input type="text" name="_gotcha" class="hidden-field" tabindex="-1" autocomplete="off" aria-hidden="true">

      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" name="name" required aria-required="true">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required aria-required="true">
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" required aria-required="true"></textarea>
      </div>

      <button type="submit">
        <span class="btn-text">Send Message</span>
      </button>

      <p class="form-status" aria-live="polite"></p>
    </form>
  </div>
</section>

<script src="/portfolio/contact.js"></script>
